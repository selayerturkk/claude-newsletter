name: Generate & Send Newsletter

on:
  schedule:
    # 8:00 AM EST every Monday and Wednesday (13:00 UTC)
    - cron: '0 13 * * 1,3'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 generate_newsletter.py

      - name: Verify newsletter was created
        id: info
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          if [ ! -f "newsletters/${TODAY}-newsletter.html" ]; then
            echo "ERROR: Newsletter file was not created"
            exit 1
          fi
          echo "Newsletter generated successfully"

          NEXT_ISSUE=$(python3 -c "
          import json
          with open('newsletters/index.json') as f:
              issues = json.load(f)
          print(issues[-1]['issue_number'])
          ")
          echo "next_issue=$NEXT_ISSUE" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Send newsletter emails
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.GMAIL_ADDRESS }}
          SUBSCRIBERS_SHEET_URL: ${{ secrets.SUBSCRIBERS_SHEET_URL }}
          SIGNUP_FORM_URL: ${{ secrets.SIGNUP_FORM_URL }}
          NEWSLETTER_BASE_URL: https://selayerturkk.github.io/claude-newsletter/newsletters
        run: |
          TODAY="${{ steps.info.outputs.today }}"
          python3 send_email.py "newsletters/${TODAY}-newsletter.html"

      - name: Commit and push new issue
        run: |
          git config user.name "Claude & Co. Bot"
          git config user.email "actions@github.com"
          git add newsletters/
          git commit -m "Add Issue #${{ steps.info.outputs.next_issue }} — ${{ steps.info.outputs.today }}"
          git push

  # Deploy updated site to GitHub Pages after new issue is pushed
  deploy-pages:
    needs: generate-and-send
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # Pull the latest commit (with the new issue)
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
